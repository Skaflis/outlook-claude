<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claude Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <style>
    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --surface-hover: #f0eeeb;
      --text: #1a1a1a;
      --text-secondary: #6b6560;
      --accent: #c45d3e;
      --accent-hover: #a94e34;
      --accent-light: #fdf0ec;
      --border: #e5e2dc;
      --success: #3a7d5c;
      --success-light: #edf7f1;
      --radius: 10px;
      --radius-sm: 7px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13.5px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ---- Header ---- */
    .header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      width: 26px;
      height: 26px;
      background: var(--accent);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 14px;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 4px;
      border-radius: 6px;
      transition: all 0.15s;
      font-size: 18px;
      line-height: 1;
    }

    .settings-btn:hover { background: var(--surface-hover); color: var(--text); }

    /* ---- Settings Panel ---- */
    .settings-panel {
      display: none;
      padding: 14px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .settings-panel.visible { display: block; }

    .settings-panel label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .api-key-row {
      display: flex;
      gap: 6px;
    }

    .api-key-row input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', monospace;
      font-size: 12px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .api-key-row input:focus { border-color: var(--accent); }

    .api-key-row button {
      padding: 8px 12px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .api-key-row button:hover { background: var(--accent-hover); }

    .api-status {
      font-size: 11.5px;
      margin-top: 6px;
      color: var(--success);
    }

    .api-status.error { color: var(--accent); }

    /* ---- Main Content ---- */
    .main {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ---- Section Labels ---- */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-secondary);
      margin-bottom: 2px;
    }

    /* ---- Quick Actions ---- */
    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .quick-btn {
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: var(--shadow-sm);
    }

    .quick-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    .quick-btn:active { transform: scale(0.97); }

    /* ---- Custom Prompt ---- */
    .prompt-area {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .prompt-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
      min-height: 70px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      box-shadow: var(--shadow-sm);
    }

    .prompt-input:focus { border-color: var(--accent); }

    .prompt-input::placeholder { color: #b0a99f; }

    .send-btn {
      align-self: flex-end;
      padding: 9px 18px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:active { transform: scale(0.97); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .send-btn .arrow { font-size: 15px; }

    /* ---- Response Area ---- */
    .response-area {
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .response-area.visible { display: flex; }

    .response-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.6;
      max-height: 350px;
      overflow-y: auto;
      box-shadow: var(--shadow-sm);
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .response-actions {
      display: flex;
      gap: 6px;
    }

    .action-btn {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .action-btn:hover { border-color: var(--accent); color: var(--accent); }

    .action-btn.primary {
      background: var(--success);
      color: white;
      border-color: var(--success);
    }

    .action-btn.primary:hover { background: #327050; border-color: #327050; color: white; }

    /* ---- Loading ---- */
    .loading {
      display: none;
      padding: 20px;
      text-align: center;
    }

    .loading.visible { display: block; }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 12.5px;
      color: var(--text-secondary);
    }

    /* ---- Status Messages ---- */
    .status-bar {
      display: none;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
    }

    .status-bar.visible { display: block; }
    .status-bar.success { background: var(--success-light); color: var(--success); }
    .status-bar.error { background: var(--accent-light); color: var(--accent); }

    /* ---- Email Preview ---- */
    .email-preview {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 12px;
      color: var(--text-secondary);
      max-height: 60px;
      overflow: hidden;
      position: relative;
    }

    .email-preview::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 20px;
      background: linear-gradient(transparent, var(--surface));
    }

    .email-preview strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ---- No API Key Warning ---- */
    .no-key-warning {
      padding: 12px 14px;
      background: #fff8e6;
      border: 1px solid #f0d060;
      border-radius: var(--radius-sm);
      font-size: 12.5px;
      color: #7a6520;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">C</div>
      <h1>Claude</h1>
    </div>
    <button class="settings-btn" onclick="toggleSettings()" title="Innstillinger">⚙</button>
  </div>

  <!-- Settings -->
  <div class="settings-panel" id="settingsPanel">
    <label>Anthropic API-nøkkel</label>
    <div class="api-key-row">
      <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..."/>
      <button onclick="saveApiKey()">Lagre</button>
    </div>
    <div class="api-status" id="apiStatus"></div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- No API Key Warning -->
    <div class="no-key-warning" id="noKeyWarning" style="display:none;">
      ⚠️ Legg inn API-nøkkelen din først. Klikk ⚙ øverst til høyre.
    </div>

    <!-- Email Preview -->
    <div>
      <div class="section-label">E-post</div>
      <div class="email-preview" id="emailPreview">
        Laster e-postinnhold...
      </div>
    </div>

    <!-- Quick Actions -->
    <div>
      <div class="section-label">Hurtighandlinger</div>
      <div class="quick-actions">
        <button class="quick-btn" onclick="runQuick('Skriv et høflig svar som avslår tilbudet. Kort og profesjonelt.')">Nei til salg</button>
        <button class="quick-btn" onclick="runQuick('Forbedre skrivekvaliteten i denne e-posten. Behold meningen, men gjør den mer profesjonell og tydelig.')">Skriv bedre</button>
        <button class="quick-btn" onclick="runQuick('Lag en kort oppsummering av denne e-posten i 2-3 setninger.')">Oppsummer</button>
        <button class="quick-btn" onclick="runQuick('Skriv et kort, vennlig svar som bekrefter mottak og sier vi kommer tilbake til dem.')">Bekreft mottak</button>
        <button class="quick-btn" onclick="runQuick('Oversett denne e-posten til engelsk.')">Til engelsk</button>
      </div>
    </div>

    <!-- Custom Prompt -->
    <div class="prompt-area">
      <div class="section-label">Egen instruks</div>
      <textarea class="prompt-input" id="promptInput" placeholder="F.eks. «Skriv et svar som foreslår et møte neste uke...»"></textarea>
      <button class="send-btn" id="sendBtn" onclick="runCustom()">
        Send <span class="arrow">→</span>
      </button>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">Claude tenker...</div>
    </div>

    <!-- Response -->
    <div class="response-area" id="responseArea">
      <div class="section-label">Svar fra Claude</div>
      <div class="response-box" id="responseBox"></div>
      <div class="response-actions">
        <button class="action-btn" onclick="copyResponse()">📋 Kopier</button>
        <button class="action-btn primary" onclick="insertResponse()">✏️ Sett inn i e-post</button>
      </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar"></div>

  </div>

  <script>
    // ---- State ----
    let emailContent = '';
    let emailSubject = '';
    let lastResponse = '';
    let isCompose = false;

    // ---- Office.js Init ----
    Office.onReady(function(info) {
      if (info.host === Office.HostType.Outlook) {
        loadEmailContent();
      }
      checkApiKey();
    });

    function loadEmailContent() {
      try {
        const item = Office.context.mailbox.item;
        emailSubject = item.subject || '';

        // Check if we're in compose or read mode
        if (item.getComposeTypeAsync) {
          // Newer API
          isCompose = true;
        }

        // Try to get body content
        if (item.body && item.body.getAsync) {
          item.body.getAsync(Office.CoercionType.Text, function(result) {
            if (result.status === Office.AsyncResultStatus.Succeeded) {
              emailContent = result.value || '';
              updateEmailPreview();
            } else {
              // Fallback for read mode
              tryReadModeContent(item);
            }
          });
        } else {
          tryReadModeContent(item);
        }
      } catch (e) {
        document.getElementById('emailPreview').innerHTML =
          '<strong>Kunne ikke laste e-post</strong><br/>Åpne en e-post for å komme i gang.';
      }
    }

    function tryReadModeContent(item) {
      // In read mode, try to get the body via the item
      if (item.body) {
        item.body.getAsync(Office.CoercionType.Text, function(result) {
          if (result.status === Office.AsyncResultStatus.Succeeded) {
            emailContent = result.value || '';
          }
          updateEmailPreview();
        });
      } else {
        emailContent = '';
        updateEmailPreview();
      }
    }

    function updateEmailPreview() {
      const preview = document.getElementById('emailPreview');
      if (emailSubject || emailContent) {
        const truncated = emailContent.substring(0, 150);
        preview.innerHTML = (emailSubject ? '<strong>' + escapeHtml(emailSubject) + '</strong><br/>' : '')
          + escapeHtml(truncated) + (emailContent.length > 150 ? '...' : '');
      } else {
        preview.innerHTML = '<strong>Ingen innhold funnet</strong><br/>Åpne eller skriv en e-post først.';
      }
    }

    // ---- API Key Management ----
    function checkApiKey() {
      const key = localStorage.getItem('claude_api_key');
      const warning = document.getElementById('noKeyWarning');
      const status = document.getElementById('apiStatus');

      if (key) {
        warning.style.display = 'none';
        status.textContent = '✓ API-nøkkel er lagret';
        status.className = 'api-status';
        document.getElementById('apiKeyInput').value = key;
      } else {
        warning.style.display = 'block';
      }
    }

    function saveApiKey() {
      const input = document.getElementById('apiKeyInput');
      const key = input.value.trim();
      const status = document.getElementById('apiStatus');

      if (!key) {
        status.textContent = 'Skriv inn en API-nøkkel';
        status.className = 'api-status error';
        return;
      }

      localStorage.setItem('claude_api_key', key);
      status.textContent = '✓ Lagret!';
      status.className = 'api-status';
      document.getElementById('noKeyWarning').style.display = 'none';
    }

    function toggleSettings() {
      const panel = document.getElementById('settingsPanel');
      panel.classList.toggle('visible');
    }

    // ---- Quick Actions ----
    function runQuick(prompt) {
      callClaude(prompt);
    }

    function runCustom() {
      const prompt = document.getElementById('promptInput').value.trim();
      if (!prompt) return;
      callClaude(prompt);
    }

    // ---- Claude API ----
    async function callClaude(userPrompt) {
      const apiKey = localStorage.getItem('claude_api_key');
      if (!apiKey) {
        showStatus('Legg inn API-nøkkel først (klikk ⚙)', 'error');
        return;
      }

      // Show loading
      document.getElementById('loading').classList.add('visible');
      document.getElementById('responseArea').classList.remove('visible');
      document.getElementById('sendBtn').disabled = true;

      const systemPrompt = `Du er en hjelpsom e-postassistent for en norsk bedrift. Du svarer på norsk med mindre du blir bedt om noe annet. Hold svarene korte, profesjonelle og klare. Ikke inkluder emnelinjer eller metadata — bare selve e-postteksten.`;

      const messageContent = emailContent
        ? `Her er e-posten jeg jobber med:\n\nEmne: ${emailSubject}\n\n${emailContent}\n\n---\n\nInstruks: ${userPrompt}`
        : `Instruks: ${userPrompt}`;

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1024,
            system: systemPrompt,
            messages: [
              { role: 'user', content: messageContent }
            ]
          })
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.error?.message || `API-feil: ${response.status}`);
        }

        const data = await response.json();
        lastResponse = data.content
          .filter(block => block.type === 'text')
          .map(block => block.text)
          .join('\n');

        // Show response
        document.getElementById('responseBox').textContent = lastResponse;
        document.getElementById('responseArea').classList.add('visible');

      } catch (err) {
        showStatus('Feil: ' + err.message, 'error');
      } finally {
        document.getElementById('loading').classList.remove('visible');
        document.getElementById('sendBtn').disabled = false;
      }
    }

    // ---- Response Actions ----
    function copyResponse() {
      navigator.clipboard.writeText(lastResponse).then(function() {
        showStatus('Kopiert til utklippstavlen!', 'success');
      }).catch(function() {
        // Fallback
        const textarea = document.createElement('textarea');
        textarea.value = lastResponse;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showStatus('Kopiert!', 'success');
      });
    }

    function insertResponse() {
      try {
        const item = Office.context.mailbox.item;
        if (item.body && item.body.setSelectedDataAsync) {
          item.body.setSelectedDataAsync(
            lastResponse,
            { coercionType: Office.CoercionType.Text },
            function(result) {
              if (result.status === Office.AsyncResultStatus.Succeeded) {
                showStatus('Satt inn i e-posten!', 'success');
              } else {
                showStatus('Kunne ikke sette inn. Prøv å kopiere i stedet.', 'error');
              }
            }
          );
        } else {
          showStatus('Kan bare sette inn tekst i compose-modus. Bruk kopier i stedet.', 'error');
        }
      } catch (e) {
        showStatus('Feil ved innsetting: ' + e.message, 'error');
      }
    }

    // ---- Utilities ----
    function showStatus(msg, type) {
      const bar = document.getElementById('statusBar');
      bar.textContent = msg;
      bar.className = 'status-bar visible ' + type;
      setTimeout(function() { bar.classList.remove('visible'); }, 3500);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ---- Keyboard Shortcut ----
    document.getElementById('promptInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
        runCustom();
      }
    });
  </script>
</body>
</html>
